# Apache 2.4 VirtualHost for Future-Ready test app
# ------------------------------------------------------------
# Install (Debian/Ubuntu):
#   sudo cp deploy/apache-future.test.conf /etc/apache2/sites-available/future.test.conf
#   sudo a2ensite future.test.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Local DNS:
#   echo '127.0.0.1 future.test www.future.test' | sudo tee -a /etc/hosts
#
# Requires: PHP-FPM (e.g. php8.4-fpm) + proxy_fcgi as in conf-enabled/php*-fpm.conf
# App expects .env in the project root (see env.example).
# ------------------------------------------------------------

<VirtualHost *:80>
    ServerName future.test
    ServerAlias www.future.test
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/html/futre_ready_test

    <Directory /var/www/html/futre_ready_test>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Do not serve dotfiles (.env, .git, etc.)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/future.test-error.log
    CustomLog ${APACHE_LOG_DIR}/future.test-access.log combined
</VirtualHost>
