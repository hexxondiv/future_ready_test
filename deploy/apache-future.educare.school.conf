# Apache 2.4 — production: https://future.educare.school
# ------------------------------------------------------------
# Prerequisites (Debian/Ubuntu):
#   sudo a2enmod ssl rewrite headers
#   Obtain TLS certs before enabling the :443 block (or Apache will fail to start
#   if the certificate files are missing). Example:
#   sudo certbot certonly --webroot -w /var/www/html/futre_ready_test \
#     -d future.educare.school -d www.future.educare.school
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# TLS: paths below match certbot’s default. If you use `certbot --apache`, it may
# patch this file automatically — merge carefully with this template.
#
# Install this file:
#   sudo cp deploy/apache-future.educare.school.conf /etc/apache2/sites-available/future.educare.school.conf
#   sudo a2ensite future.educare.school.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# DocumentRoot: change if the app lives elsewhere on the server.
# PHP: ensure php*-fpm + proxy_fcgi (conf-enabled/php*-fpm.conf).
# App: copy env.example to .env and set FUTRE_DB_* for production MySQL.
# ------------------------------------------------------------

# HTTP → HTTPS (preserves path and query string)
<VirtualHost *:80>
    ServerName future.educare.school
    ServerAlias www.future.educare.school
    ServerAdmin webmaster@localhost

    Redirect permanent / https://future.educare.school/
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName future.educare.school
    ServerAlias www.future.educare.school
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/html/futre_ready_test

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/future.educare.school/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/future.educare.school/privkey.pem
    IncludeOptional /etc/letsencrypt/options-ssl-apache.conf

    <Directory /var/www/html/futre_ready_test>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Apex as canonical host (remove this block if www should be primary)
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.future\.educare\.school$ [NC]
    RewriteRule ^ https://future.educare.school%{REQUEST_URI} [END,R=permanent]

    Header always set Strict-Transport-Security "max-age=15552000"

    ErrorLog ${APACHE_LOG_DIR}/future.educare.school-error.log
    CustomLog ${APACHE_LOG_DIR}/future.educare.school-access.log combined
</VirtualHost>
