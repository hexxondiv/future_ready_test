# Apache 2.4 — production: https://future.educare.school
# ------------------------------------------------------------
# Live site — Apache (equivalent to local future.test install + reload):
#
#   sudo cp /var/www/future_ready_test/deploy/apache-future.educare.school.conf \
#     /etc/apache2/sites-available/future.educare.school.conf
#   sudo a2ensite future.educare.school.conf
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# Live site — “hosts” equivalent: do not use /etc/hosts on the server. At your DNS
# provider, add A (and optional AAAA) records for future.educare.school and
# www.future.educare.school pointing at this machine’s public IP.
#
# Modules (once):
#   sudo a2enmod ssl rewrite headers
#
# TLS before :443 will work (cert files must exist). Example (webroot = app dir):
#   sudo certbot certonly --webroot -w /var/www/future_ready_test \
#     -d future.educare.school -d www.future.educare.school
# Paths in this file assume Let’s Encrypt live/future.educare.school/. If you use
# certbot --apache it may edit the vhost — merge with care.
#
# Production DocumentRoot: /var/www/future_ready_test
# PHP: php*-fpm + proxy_fcgi (conf-enabled/php*-fpm.conf).
# App: env.example → .env with production FUTRE_DB_*.
# ------------------------------------------------------------

# HTTP → HTTPS (preserves path and query string)
<VirtualHost *:80>
    ServerName future.educare.school
    ServerAlias www.future.educare.school
    ServerAdmin webmaster@localhost

    Redirect permanent / https://future.educare.school/
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName future.educare.school
    ServerAlias www.future.educare.school
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/future_ready_test

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/future.educare.school/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/future.educare.school/privkey.pem
    IncludeOptional /etc/letsencrypt/options-ssl-apache.conf

    <Directory /var/www/future_ready_test>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Apex as canonical host (remove this block if www should be primary)
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.future\.educare\.school$ [NC]
    RewriteRule ^ https://future.educare.school%{REQUEST_URI} [END,R=permanent]

    Header always set Strict-Transport-Security "max-age=15552000"

    ErrorLog ${APACHE_LOG_DIR}/future.educare.school-error.log
    CustomLog ${APACHE_LOG_DIR}/future.educare.school-access.log combined
</VirtualHost>
